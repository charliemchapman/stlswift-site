<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{% if page.display_title %}{{ page.display_title }} - {% endif %}{{ site.title }}</title>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/assets/favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#efb555">
    <style>
        :root {
            --bg: #fbfaf8;
            --surface: #ffffff;
            --ink: #171717;
            --muted: #5f646d;
            --line: #e4e0d8;
            --orange: #d95b26;
            --blue: #0b6fb8;
            --green: #22765f;
            --purple: #481a54;
            --shadow: 0 18px 45px rgba(21, 19, 17, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            padding-top: env(safe-area-inset-top);
            color: var(--ink);
            background:
                linear-gradient(180deg, rgba(239, 181, 85, 0.16), rgba(251, 250, 248, 0) 390px),
                var(--bg);
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
        }

        img {
            max-width: 100%;
        }

        .banner {
            width: 100%;
            height: clamp(180px, 24vw, 280px);
            overflow: hidden;
            margin-top: calc(-1 * env(safe-area-inset-top));
            position: relative;
            background: #241b12;
        }

        .banner-link {
            display: block;
            width: 100%;
            height: 100%;
            text-decoration: none;
            position: relative;
        }

        .banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 45%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .container {
            width: 100%;
            max-width: 1040px;
            margin: 0 auto;
            padding: 3rem 2rem 4rem;
            padding-left: calc(2rem + env(safe-area-inset-left));
            padding-right: calc(2rem + env(safe-area-inset-right));
        }

        h1 {
            color: var(--ink);
            font-size: clamp(3rem, 8vw, 6.25rem);
            line-height: 0.95;
            letter-spacing: 0;
            margin: 0 0 1rem;
        }

        h2 {
            font-size: clamp(1.4rem, 3vw, 2rem);
            line-height: 1.12;
            letter-spacing: 0;
            margin: 0 0 0.75rem;
        }

        p {
            margin: 0 0 1rem;
        }

        a {
            color: var(--blue);
        }

        a:focus-visible {
            outline: 3px solid rgba(11, 111, 184, 0.35);
            outline-offset: 3px;
        }

        .social-links {
            display: flex;
            flex-wrap: wrap;
            gap: 0.65rem;
        }

        .social-links a {
            display: inline-flex;
            align-items: center;
            gap: 0.55rem;
            color: var(--ink);
            text-decoration: none;
            padding: 0.65rem 0.8rem;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.74);
            transition: border-color 0.2s ease, transform 0.2s ease, background-color 0.2s ease;
        }

        .social-links a:hover {
            border-color: rgba(11, 111, 184, 0.42);
            background-color: white;
            transform: translateY(-1px);
        }

        .social-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            display: inline-block;
        }

        .main-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.65rem;
            background-color: var(--purple);
            color: white;
            min-height: 48px;
            padding: 0.78rem 1.1rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            transition: background-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
        }

        .main-link:hover {
            background-color: #723c80;
            box-shadow: var(--shadow);
            transform: translateY(-1px);
        }

        .main-link-secondary {
            background-color: var(--ink);
        }

        .main-link-secondary:hover {
            background-color: #343434;
        }

        @media (max-width: 700px) {
            .container {
                padding-top: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="banner">
        <a href="/" class="banner-link" aria-label="STL Swift home">
            <img src="/assets/images/stl-swift-flag.jpg" alt="STL Swift Flag">
        </a>
    </div>
    <div class="container">
        {{ content }}
    </div>
</body>
</html>
